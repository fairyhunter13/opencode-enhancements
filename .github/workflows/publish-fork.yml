name: Publish @fairyhunter13/opencode-enhancements

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish @fairyhunter13/opencode-enhancements
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          FORK_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "Fork version: ${FORK_VERSION}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "[dry-run] would publish @fairyhunter13/opencode-enhancements@${FORK_VERSION}"
          else
            npm publish --access public --tag fork --provenance=false
          fi

          echo "version=${FORK_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| @fairyhunter13/opencode-enhancements | ${{ steps.publish.outputs.version || 'skipped' }} | fork |" >> "$GITHUB_STEP_SUMMARY"
